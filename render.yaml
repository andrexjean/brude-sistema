services:
  - type: web
    name: brude-financas
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: brude-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
